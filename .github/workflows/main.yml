name: Deploy Application Directly to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Direct Server Deployment
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh

          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          sed -i 's/\r$//' ~/.ssh/id_rsa

          chmod 600 ~/.ssh/id_rsa

          ssh-keygen -l -f ~/.ssh/id_rsa

          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy Application
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'

            set -e

            APP_DIR="/opt/my-app"
            REPO_URL="https://github.com/vikrantkkkk/deploy_nodejs.git"

            echo "Creating application directory if missing..."
            sudo mkdir -p $APP_DIR

            if [ ! -d "$APP_DIR/.git" ]; then
              echo "Repository not found. Cloning..."
              sudo git clone $REPO_URL $APP_DIR
            else
              echo "Repository already exists."
            fi

            cd $APP_DIR

            echo "Fetching latest code..."
            sudo git reset --hard
            sudo git clean -fd
            sudo git pull origin main

            echo "Installing dependencies..."
            npm install

            echo "Stopping existing application..."
            pkill -f "server.js" || true

            echo "Starting application..."
            nohup node server.js > app.log 2>&1 &

            sleep 5

            echo "Running processes:"
            ps aux | grep server.js | grep -v grep || true

            echo "Deployment completed successfully."

          EOF
